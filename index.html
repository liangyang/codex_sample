<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily AI News</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #141b24;
      --panel-2: #182232;
      --line: #2d3a4d;
      --text: #eef4fb;
      --muted: #9fb0c3;
      --blue: #74b8ff;
      --green: #73e0a9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0b0f14 0%, #101823 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      line-height: 1.6;
    }
    main {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 24px 16px 44px;
    }
    header {
      padding: 18px 0 20px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 9vw, 42px);
      line-height: 1.08;
      letter-spacing: 0;
    }
    .sub {
      color: var(--muted);
      font-size: 14px;
    }
    .links {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    a.card {
      display: block;
      min-height: 132px;
      padding: 18px;
      color: inherit;
      text-decoration: none;
      background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, .22);
    }
    a.card:active {
      transform: translateY(1px);
    }
    .label {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 2px 9px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
    }
    .title {
      margin: 12px 0 5px;
      font-size: 23px;
      font-weight: 800;
    }
    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .path {
      display: block;
      margin-top: 12px;
      color: var(--blue);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Daily AI News</h1>
      <div class="sub">スマホ用入口。毎日更新される latest.html を同じURLで開けます。</div>
    </header>

    <section class="links" aria-label="news reports">
      <a class="card" href="china-news-watch/latest.html">
        <span class="label">China</span>
        <div class="title">中国AIニュース</div>
        <p class="desc">中国AIニュースの日次レポート最新版。</p>
        <span class="path">/china-news-watch/latest.html</span>
      </a>

      <a class="card" href="global-ai-news-watch/latest.html">
        <span class="label">Global</span>
        <div class="title">世界AIニュース</div>
        <p class="desc">世界AIニュースの日次レポート最新版。</p>
        <span class="path">/global-ai-news-watch/latest.html</span>
      </a>
    </section>

    <footer>
      このページをスマホでブックマークすれば、翌日以降も最新版に進めます。
    </footer>
  </main>
</body>
</html>
